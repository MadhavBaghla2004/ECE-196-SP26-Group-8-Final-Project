---
layout: default
---

<style>
  .site-wrap {
    display: flex;
    min-height: 100vh;
  }

  .sidebar {
    width: 240px;
    background: #1f1f1f;
    padding: 2rem 1.25rem;
    box-sizing: border-box;
    position: sticky;
    top: 0;
    height: 100vh;
  }

  .sidebar h2 {
    color: white;
    font-size: 1.2rem;
    margin: 0 0 1rem 0;
  }

  .sidebar a {
    display: block;
    color: #d6d6d6;
    text-decoration: none;
    padding: 0.75rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar a:hover {
    color: white;
  }

  .main-content {
    flex: 1;
    padding: 3rem;
  }

  .hero-box {
    max-width: 900px;
  }

  @media screen and (max-width: 980px) {
    .site-wrap {
      flex-direction: column;
    }

    .sidebar {
      width: 100%;
      height: auto;
      position: relative;
    }

    .main-content {
      padding: 2rem 1.25rem;
    }
  }
</style>

<div class="site-wrap">
  <aside class="sidebar">
    <h2>Navigation</h2>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/team/' | relative_url }}">Team</a>
    <a href="{{ '/problem/' | relative_url }}">Problem</a>
  </aside>

  <main class="main-content">
    <div class="hero-box">
      <h1>{{ page.title }}</h1>
      {{ content }}
    </div>
  </main>
</div>
