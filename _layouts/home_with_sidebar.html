---
layout: default
---

<style>
  .hamburger {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 28px;
    cursor: pointer;
    z-index: 1001;
    color: white;
  }

  .sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    left: 0;
    background-color: #1f1f1f;
    overflow-x: hidden;
    transition: 0.3s;
    padding-top: 60px;
    z-index: 1000;
  }

  .sidebar a {
    padding: 12px 24px;
    text-decoration: none;
    font-size: 18px;
    color: #ddd;
    display: block;
  }

  .sidebar a:hover {
    color: white;
    background: #333;
  }

  .closebtn {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    color: white;
  }

  .main-content {
    padding: 3rem;
  }
</style>

<!-- Hamburger icon -->
<div class="hamburger" onclick="openNav()">☰</div>

<!-- Sidebar menu -->
<div id="mySidebar" class="sidebar">
  <span class="closebtn" onclick="closeNav()">×</span>
  <a href="{{ '/' | relative_url }}">Home</a>
  <a href="{{ '/team/' | relative_url }}">Team</a>
  <a href="{{ '/problem/' | relative_url }}">Problem</a>
</div>

<!-- Page content -->
<div class="main-content">
  <h1>{{ page.title }}</h1>
  {{ content }}
</div>

<script>
function openNav() {
  document.getElementById("mySidebar").style.width = "250px";
}

function closeNav() {
  document.getElementById("mySidebar").style.width = "0";
}
</script>
