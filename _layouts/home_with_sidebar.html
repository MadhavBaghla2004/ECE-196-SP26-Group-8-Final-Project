---
layout: default
---

<style>
  body {
    margin: 0;
  }

  .page-bg {
    min-height: 100vh;
    background-image: linear-gradient(rgba(255,255,255,0.72), rgba(255,255,255,0.72)), url("{{ '/images/Hydroponics.webp' | relative_url }}");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }

  .top-header {
    background: #111;
    color: white;
    padding: 20px;
    text-align: center;
    font-size: 28px;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .hamburger {
    position: fixed;
    top: 18px;
    left: 20px;
    font-size: 28px;
    cursor: pointer;
    z-index: 1100;
    color: white;
  }

  .sidebar {
    height: 100%;
    width: 0;
    position: fixed;
    top: 0;
    left: 0;
    background-color: #1f1f1f;
    overflow-x: hidden;
    transition: 0.3s;
    padding-top: 60px;
    z-index: 1050;
  }

  .sidebar a {
    padding: 12px 24px;
    text-decoration: none;
    font-size: 18px;
    color: #ddd;
    display: block;
  }

  .sidebar a:hover {
    color: white;
    background: #333;
  }

  .closebtn {
    position: absolute;
    top: 10px;
    right: 20px;
    font-size: 30px;
    cursor: pointer;
    color: white;
  }

  .main-content {
    padding: 40px;
    min-height: calc(100vh - 80px);
  }
</style>

<div class="page-bg">
  <div class="top-header">
    ECE 196 Group 8 Final Project
  </div>

  <div class="hamburger" onclick="openNav()">☰</div>

  <div id="mySidebar" class="sidebar">
    <span class="closebtn" onclick="closeNav()">×</span>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/team/' | relative_url }}">Team</a>
    <a href="{{ '/problem/' | relative_url }}">Problem</a>
  </div>

  <div class="main-content">
    {{ content }}
  </div>
</div>

<script>
  function openNav() {
    document.getElementById("mySidebar").style.width = "250px";
  }

  function closeNav() {
    document.getElementById("mySidebar").style.width = "0";
  }
</script>
